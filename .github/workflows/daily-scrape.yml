name: Daily News Scrape

on:
  schedule:
    # 8:30 AM Beijing time (UTC+8) = 0:30 UTC
    - cron: "30 0 * * *"
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Scrape today's news
        run: npx tsx scripts/scrape.ts

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DATE=$(date +%Y-%m-%d)
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard src/data/news/)" ]; then
            echo "No changes to commit"
            exit 0
          fi

          git add src/data/news/
          git commit -m "data: auto scrape ${DATE}"
          git push
